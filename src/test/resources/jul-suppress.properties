# JUL configuration active for the test JVM from process startup.
#
# The ES test framework (ESTestCase.beforeClass) later installs Log4jBridgeHandler
# which routes all subsequent JUL output through log4j2 instead.  Messages emitted
# *before* that bridge is in place would otherwise go to the default ConsoleHandler.
#
# Suppress Lucene's "Java vector incubator module is not readable" JUL warning that
# is printed once (static initialiser of VectorizationProvider) before the bridge
# is installed.  The warning is a performance notice only; analysis still works.
org.apache.lucene.internal.vectorization.level = OFF
