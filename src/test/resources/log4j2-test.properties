status = error

appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{ISO8601}][%-5p][%-25c] %m%n

rootLogger.level = info
rootLogger.appenderRef.console.ref = console

logger.nativeAccess.name = org.elasticsearch.nativeaccess
logger.nativeAccess.level = error

# Suppress Lucene vector API unavailability warning (Lucene uses JUL, which the ES test
# framework bridges to log4j2 via Log4jBridgeHandler installed in ESTestCase.beforeClass).
# Triggered when --add-modules jdk.incubator.vector is absent on Java <=21.
logger.luceneVector.name = org.apache.lucene.internal.vectorization
logger.luceneVector.level = error

# Suppress IndexShard's "expensive diagnostic checks" WARN that the randomized-testing
# framework triggers by randomly setting index.shard.check_on_startup=checksum.
logger.indexShard.name = org.elasticsearch.index.shard.IndexShard
logger.indexShard.level = error

# Suppress ES deprecation log warnings (deprecated-but-uncontrollable settings)
# (path.shared_data set by ESSingleNodeTestCase, bloom_filter from ES internals)
# NOTE: For embedded-node tests (ESSingleNodeTestCase / ESIntegTestCase) the ES
# LogConfigurator resets levels in @BeforeClass; those classes use Configurator.setLevel()
# in their own @BeforeClass to re-apply this suppression after the ES config runs.
logger.deprecation.name = org.elasticsearch.deprecation
logger.deprecation.level = error
